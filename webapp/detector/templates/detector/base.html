<!-- webapp/detector/templates/detector/base.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Detectra{% endblock %}</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Outfit', sans-serif;
        background: #f7f7f7;
        color: #111;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      nav {
        width: 100%;
        background: #fff;
        border-bottom: 1px solid #e8e8e8;
        padding: 0 32px;
        height: 56px;
        display: flex;
        align-items: center;
        gap: 0;
      }

      .nav-logo {
        font-size: 15px;
        font-weight: 600;
        color: #111;
        text-decoration: none;
        letter-spacing: -0.01em;
      }

      .nav-dot {
        width: 5px;
        height: 5px;
        background: #ccc;
        border-radius: 50%;
        margin: 0 10px;
        flex-shrink: 0;
      }

      .nav-sub {
        font-size: 12px;
        color: #999;
        font-family: 'Geist Mono', monospace;
      }

      .nav-link {
        margin-left: auto;
        font-size: 13px;
        color: #555;
        text-decoration: none;
        font-weight: 500;
        padding: 6px 14px;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        transition: color 0.15s, border-color 0.15s;
      }

      .nav-link:hover {
        color: #111;
        border-color: #aaa;
      }

      .container {
        width: 100%;
        max-width: 860px;
        padding: 40px 24px;
        flex: 1;
      }

      .card {
        background: #fff;
        border: 1px solid #e8e8e8;
        border-radius: 12px;
        padding: 36px;
      }

      h1 {
        font-size: 22px;
        font-weight: 600;
        color: #111;
        margin-bottom: 6px;
      }

      h2 {
        font-size: 14px;
        color: #888;
        font-weight: 400;
        margin-bottom: 28px;
        line-height: 1.6;
      }

      .error-box {
        background: #fff5f5;
        border: 1px solid #fecaca;
        border-radius: 8px;
        padding: 12px 16px;
        color: #b91c1c;
        font-size: 13px;
        margin-bottom: 24px;
      }

      footer {
        width: 100%;
        border-top: 1px solid #eee;
        padding: 16px 32px;
        color: #bbb;
        font-size: 12px;
        font-family: 'Geist Mono', monospace;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <nav>
      <a class="nav-logo" href="/">Detectra</a>
      <span class="nav-dot"></span>
      <span class="nav-sub">Pokhara University</span>
      <a class="nav-link" href="/history/">History</a>
    </nav>

    <div class="container">{% block content %}{% endblock %}</div>

    <footer>
      Detectra FYP — ResNeXt50 + LSTM Hybrid Architecture
    </footer>
  </body>
</html>
