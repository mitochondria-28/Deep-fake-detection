<!-- webapp/detector/templates/detector/base.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Detectra{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Modern Minimalist base */
        --charcoal: #36454f;
        --charcoal-soft: #475762;
        --slate: #708090;
        --slate-light: #9aa6ad;
        --light-gray: #d3d3d3;
        --pale-gray: #eef0f1;
        --white: #ffffff;

        /* Signature accent — forensic marker amber, used sparingly */
        --marker: #c9962e;
        --marker-soft: #f6ecd6;
        --marker-line: rgba(201, 150, 46, 0.35);

        /* Status colors, desaturated to stay in family */
        --danger: #b3473f;
        --danger-bg: #fbf0ee;
        --safe: #3f7a5c;
        --safe-bg: #eef6f1;

        --radius-sm: 8px;
        --radius-md: 14px;
        --radius-lg: 20px;

        --shadow-card: 0 1px 2px rgba(54, 69, 79, 0.04), 0 8px 24px rgba(54, 69, 79, 0.06);
        --shadow-card-hover: 0 1px 2px rgba(54, 69, 79, 0.05), 0 14px 32px rgba(54, 69, 79, 0.09);

        --font-display: 'Outfit', sans-serif;
        --font-mono: 'Geist Mono', monospace;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      html { -webkit-font-smoothing: antialiased; }

      body {
        font-family: var(--font-display);
        background: #fafafa;
        background-image:
          radial-gradient(circle at 1px 1px, rgba(54, 69, 79, 0.045) 1px, transparent 0);
        background-size: 28px 28px;
        color: var(--charcoal);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* ── Nav ── */
      nav {
        width: 100%;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid #e8e8e8;
        padding: 0 36px;
        height: 64px;
        display: flex;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 50;
      }

      .nav-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }

      .nav-mark {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: var(--charcoal);
        position: relative;
        flex-shrink: 0;
        overflow: hidden;
      }

      .nav-mark::after {
        content: '';
        position: absolute;
        left: 0; right: 0;
        top: 50%;
        height: 1.5px;
        background: var(--marker);
        box-shadow: 0 0 6px var(--marker-line);
        animation: scanline 2.6s ease-in-out infinite;
      }

      @keyframes scanline {
        0%, 100% { top: 18%; opacity: 0.4; }
        50% { top: 78%; opacity: 1; }
      }

      .nav-logo-text {
        font-size: 16px;
        font-weight: 700;
        color: var(--charcoal);
        letter-spacing: -0.01em;
      }

      .nav-dot {
        width: 4px;
        height: 4px;
        background: var(--light-gray);
        border-radius: 50%;
        margin: 0 12px;
        flex-shrink: 0;
      }

      .nav-sub {
        font-size: 12px;
        color: var(--slate);
        font-family: var(--font-mono);
        letter-spacing: 0.01em;
      }

      .nav-link {
        margin-left: auto;
        font-size: 13px;
        color: var(--charcoal-soft);
        text-decoration: none;
        font-weight: 600;
        padding: 8px 16px;
        border: 1px solid #e2e2e2;
        border-radius: var(--radius-sm);
        background: #fff;
        transition: color 0.15s, border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      }

      .nav-link:hover {
        color: var(--charcoal);
        border-color: var(--slate-light);
        box-shadow: var(--shadow-card);
        transform: translateY(-1px);
      }

      .nav-link:focus-visible,
      a:focus-visible,
      button:focus-visible,
      input:focus-visible {
        outline: 2px solid var(--marker);
        outline-offset: 2px;
      }

      .container {
        width: 100%;
        max-width: 920px;
        padding: 56px 24px 72px;
        flex: 1;
      }

      .card {
        background: #fff;
        border: 1px solid #ececec;
        border-radius: var(--radius-lg);
        padding: 44px;
        box-shadow: var(--shadow-card);
      }

      h1 {
        font-size: 26px;
        font-weight: 700;
        color: var(--charcoal);
        margin-bottom: 8px;
        letter-spacing: -0.01em;
      }

      h2 {
        font-size: 15px;
        color: var(--slate);
        font-weight: 400;
        margin-bottom: 32px;
        line-height: 1.65;
      }

      .error-box {
        background: var(--danger-bg);
        border: 1px solid #f0d4d1;
        border-radius: var(--radius-sm);
        padding: 14px 18px;
        color: var(--danger);
        font-size: 13.5px;
        margin-bottom: 26px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 500;
      }

      footer {
        width: 100%;
        border-top: 1px solid #eee;
        padding: 20px 32px;
        color: var(--slate-light);
        font-size: 12px;
        font-family: var(--font-mono);
        text-align: center;
        letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <nav>
      <a class="nav-logo" href="/">
        <span class="nav-mark" aria-hidden="true"></span>
        <span class="nav-logo-text">Detectra</span>
      </a>
      <span class="nav-dot"></span>
      <span class="nav-sub">Pokhara University · FYP</span>
      <a class="nav-link" href="/history/">History</a>
    </nav>

    <div class="container">{% block content %}{% endblock %}</div>

    <footer>
      Detectra — ResNeXt50 + LSTM Hybrid Architecture
    </footer>
  </body>
</html>
