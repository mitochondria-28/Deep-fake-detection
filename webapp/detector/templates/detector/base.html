<!-- webapp/detector/templates/detector/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Detectra{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    nav {
      width: 100%;
      background: #12122a;
      border-bottom: 1px solid #2a2a5a;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #00d4ff;
      letter-spacing: 2px;
      text-decoration: none;
    }
    .nav-sub {
      font-size: 0.78rem;
      color: #8888aa;
      margin-left: 4px;
    }

    .container {
      width: 100%;
      max-width: 860px;
      padding: 40px 24px;
      flex: 1;
    }

    .card {
      background: #12122a;
      border: 1px solid #2a2a5a;
      border-radius: 16px;
      padding: 36px;
    }

    h1 { font-size: 1.6rem; color: #fff; margin-bottom: 8px; }
    h2 { font-size: 1.1rem; color: #9999cc; font-weight: 400; margin-bottom: 28px; }

    .error-box {
      background: rgba(255, 80, 80, 0.12);
      border: 1px solid #ff5050;
      border-radius: 10px;
      padding: 14px 18px;
      color: #ff8888;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }

    footer {
      padding: 20px;
      color: #555577;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
 <nav>
  <a class="nav-logo" href="/">DETECTRA</a>
  <span class="nav-sub">Deepfake Detection · Pokhara University</span>
  <a href="/history/" style="margin-left:auto;color:#8888aa;font-size:0.85rem;
     text-decoration:none;" onmouseover="this.style.color='#00d4ff'"
     onmouseout="this.style.color='#8888aa'">History</a>
</nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <footer>Detectra FYP — ResNeXt50 + LSTM Hybrid Architecture</footer>
</body>
</html>
